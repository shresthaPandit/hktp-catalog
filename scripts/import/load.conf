-- pgloader configuration for HK Trailer Parts MySQL -> Supabase import
--
-- Schema findings (from hktrailer_products_only.sql analysis):
--   Products table: tbl_product (NOT "products")
--   Images table:   tbl_product_image (separate, joined by fk_product_id)
--   Categories:     tbl_product_category (with parent_id hierarchy)
--   Cross-refs:     tbl_product_cross_ref (alternate/OEM part numbers)
--   Brand table:    tbl_brand (not directly FK'd to tbl_product)
--
-- Prerequisites:
--   1. Run detect-charset.sh first to confirm encoding
--      File uses utf8mb4 (no iconv conversion needed for main file)
--   2. Load dump into local MySQL:
--      mysql -u root -p hktrailer_db < hktrailer_products_only.sql
--   3. Replace MYSQL_USER, MYSQL_PASSWORD, MYSQL_HOST, MYSQL_DB below
--      MYSQL_DB is typically 'hktrailer' (from dump header: Database: hktrailer)
--   4. Replace SUPABASE_PROJECT_REF and SUPABASE_DB_PASSWORD
--      (Supabase Dashboard -> Settings -> Database -> Connection string)
-- Run: pgloader scripts/import/load.conf
--
-- WHAT THIS DOES:
--   Imports tbl_product, tbl_product_image, tbl_product_cross_ref,
--   tbl_product_category, and tbl_brand into Supabase as staging tables.
--   The transform.sql script then joins them into the final products table.
--
-- ALTERNATIVE (no local MySQL):
--   If you cannot install MySQL locally:
--   Option A: Use a Docker MySQL container:
--     docker run --name hktrailer-mysql -e MYSQL_ROOT_PASSWORD=root \
--       -e MYSQL_DATABASE=hktrailer -p 3306:3306 -d mysql:8.0
--     docker exec -i hktrailer-mysql mysql -uroot -proot hktrailer \
--       < hktrailer_products_only.sql
--     Then run pgloader with MYSQL_HOST=127.0.0.1
--   Option B: Use a PostgreSQL-compatible conversion tool (see transform.sql comments)

LOAD DATABASE
     FROM      mysql://MYSQL_USER:MYSQL_PASSWORD@MYSQL_HOST/MYSQL_DB
     INTO      postgresql://postgres:SUPABASE_DB_PASSWORD@db.SUPABASE_PROJECT_REF.supabase.co:5432/postgres

WITH include drop, create tables, reset sequences,
     workers = 4, concurrency = 1,
     prefetch rows = 1000, batch rows = 100, batch size = 20MB

SET PostgreSQL PARAMETERS
  maintenance_work_mem to '128MB',
  work_mem to '16MB'

CAST
  type tinyint  to boolean using tinyint-to-boolean,
  type datetime to timestamp,
  type int      to integer,
  type bigint   to bigint,
  type float    to float,
  type decimal  to numeric,
  -- Default remaining columns to text for safe staging
  column *.*    to text

INCLUDING ONLY TABLE NAMES MATCHING
  'tbl_product',
  'tbl_product_image',
  'tbl_product_cross_ref',
  'tbl_product_category',
  'tbl_product_assigned_category',
  'tbl_brand'

-- Rename all staging tables with _staging suffix
RENAMING TABLE 'tbl_product'                  TO 'staging_product',
              'tbl_product_image'              TO 'staging_product_image',
              'tbl_product_cross_ref'          TO 'staging_product_cross_ref',
              'tbl_product_category'           TO 'staging_product_category',
              'tbl_product_assigned_category'  TO 'staging_product_assigned_category',
              'tbl_brand'                      TO 'staging_brand'

AFTER LOAD DO
  $$ CREATE INDEX IF NOT EXISTS idx_stg_product_id
       ON staging_product(id); $$,
  $$ CREATE INDEX IF NOT EXISTS idx_stg_product_sku
       ON staging_product(sku); $$,
  $$ CREATE INDEX IF NOT EXISTS idx_stg_img_product_id
       ON staging_product_image(fk_product_id); $$,
  $$ CREATE INDEX IF NOT EXISTS idx_stg_xref_product_id
       ON staging_product_cross_ref(fk_product_id); $$,
  $$ CREATE INDEX IF NOT EXISTS idx_stg_assigned_cat_product_id
       ON staging_product_assigned_category(fk_product_id); $$;
